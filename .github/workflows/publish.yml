name: Build and publish production images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Override image tag (default: git SHA)"
        required: false

env:
  REGISTRY: ghcr.io
  EVENNIA_IMAGE: ${{ github.repository_owner }}/aurnom-evennia
  WEB_IMAGE: ${{ github.repository_owner }}/aurnom-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}"

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Evennia game server image ---
      # Build context: repo root (includes game/ source and Dockerfile)
      - name: Build and push Evennia image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            EVENNIA_INSTALL_MODE=pypi
            INSTALL_POSTGRES=true
          tags: |
            ${{ env.REGISTRY }}/${{ env.EVENNIA_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.EVENNIA_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Next.js frontend image ---
      # Build context: repo root so Dockerfile.frontend can COPY frontend/aurnom/
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/kvm/edge/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
