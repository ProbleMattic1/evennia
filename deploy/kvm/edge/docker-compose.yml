# KVM 2 — Edge: reverse proxy + production Next.js frontend
# Pull this folder onto KVM 2 then:
#   cp .env.example .env
#   docker compose up -d

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started

  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    # Not exposed to the public — proxy talks to it on the internal network.
    expose:
      - "3000"
    environment:
      # Server-side API calls go straight to KVM 4 internal address.
      EVENNIA_BASE_URL: ${EVENNIA_BASE_URL}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

networks:
  default:
    name: edge_net

volumes:
  caddy_data:
  caddy_config:
