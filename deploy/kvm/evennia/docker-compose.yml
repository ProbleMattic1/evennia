# KVM 4 — Evennia game server
# Pulls the production image from the registry (built and pushed by CI).
# No application source on this host, no bind-mounts.
# Pull this folder onto KVM 4 then:
#   cp .env.example .env   # fill real credentials + KVM 8 private IP
#   docker compose run --rm evennia evennia migrate --noinput
#   docker compose up -d

services:
  evennia:
    # CI pushes versioned tags to your registry on each release.
    # Update IMAGE_TAG in .env to roll forward or back.
    image: ${REGISTRY_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    stdin_open: true
    tty: true
    # No depends_on: postgres — DB lives on a separate host (KVM 8).
    # Evennia will retry the DB connection via Django at startup.
    ports:
      # Bind to private/loopback; KVM 2 reverse proxy is the only public entry point.
      # Adjust the host IP to the private interface address on KVM 4.
      - "${BIND_HOST:-127.0.0.1}:4000:4000"
      - "${BIND_HOST:-127.0.0.1}:4001:4001"
      - "${BIND_HOST:-127.0.0.1}:4002:4002"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      EVENNIA_SUPERUSER_USERNAME: ${EVENNIA_SUPERUSER_USERNAME}
      EVENNIA_SUPERUSER_PASSWORD: ${EVENNIA_SUPERUSER_PASSWORD}
      EVENNIA_SUPERUSER_EMAIL: ${EVENNIA_SUPERUSER_EMAIL:-""}
    entrypoint: ["/usr/local/bin/evennia-docker-entrypoint.sh"]
    command: ["evennia", "start", "-l"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 4001), 2); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
