# KVM 1 — Ops: monitoring + backup
# No game process, no primary Postgres.
# Pull this folder onto KVM 1 then:
#   cp .env.example .env
#   docker compose up -d

services:

  # --- Uptime / health dashboards ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"

  # --- Host metrics collector (runs on KVM 1 host itself) ---
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # --- Prometheus (optional — can also use hosted Grafana Cloud free tier) ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  # --- Grafana ---
  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus

  # --- Scheduled backup ---
  # Runs pg_dump over the network to KVM 8, writes to a local staging path,
  # then a host cron syncs that path to S3-compatible offsite storage.
  # Alternatively wire the rclone sync into this container's command.
  backup:
    image: postgres:14-alpine
    restart: "no"
    profiles:
      - backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${BACKUP_STAGING_DIR:-./backups}:/backups
      - ./backup.sh:/backup.sh:ro
    command: ["/bin/sh", "/backup.sh"]

volumes:
  uptime_data:
  prometheus_data:
  grafana_data:
