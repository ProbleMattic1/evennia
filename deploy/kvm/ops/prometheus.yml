global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # KVM 1 self
  - job_name: kvm1_node
    static_configs:
      - targets: ["localhost:9100"]

  # KVM 8 — Postgres host node-exporter (run node-exporter on that host too)
  - job_name: kvm8_node
    static_configs:
      - targets: ["10.0.0.KVM8:9100"]

  # KVM 4 — Evennia host node-exporter
  - job_name: kvm4_node
    static_configs:
      - targets: ["10.0.0.KVM4:9100"]

  # KVM 2 — Edge host node-exporter
  - job_name: kvm2_node
    static_configs:
      - targets: ["10.0.0.KVM2:9100"]

  # KVM 8 — Postgres exporter (uncomment when postgres-exporter is enabled in postgres stack)
  # - job_name: kvm8_postgres
  #   static_configs:
  #     - targets: ["10.0.0.KVM8:9187"]
