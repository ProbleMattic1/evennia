# KVM 8 — PostgreSQL primary
# Runs ONLY postgres. No Evennia, no frontend.
# Pull this folder (or the full deploy/kvm subtree) onto KVM 8 then:
#   cp .env.example .env   # fill real credentials
#   docker compose up -d

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount custom Postgres tuning when ready:
      # - ./conf.d:/etc/postgresql/conf.d:ro
    # Bind to private network interface only — never expose 5432 on the public WAN.
    # Set server firewall to allow 5432 only from KVM 4 private IP (+ KVM 1 for backup).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional: scrape Postgres metrics from KVM 1 Prometheus.
  # Uncomment when monitoring is wired up.
  # postgres-exporter:
  #   image: prometheuscommunity/postgres-exporter:latest
  #   restart: unless-stopped
  #   environment:
  #     DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
  #   ports:
  #     - "127.0.0.1:9187:9187"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
