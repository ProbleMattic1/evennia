# Docker Compose for Evennia with PostgreSQL
#
# Based on: https://www.evennia.com/docs/latest/Setup/Installation-Docker.html
#
# Data persistence: Both the game folder and postgres data use bind mounts to
# your host machine. Data survives `docker compose down`. Avoid `docker compose
# down -v` — the -v flag removes volumes and would delete the database.
#
# Usage:
#   Start everything:
#     docker compose up
#
#   Primary URL (edge: Next + Evennia auth on one origin):
#     http://localhost:8080
#
#   Development (interactive shell):
#     docker compose run evennia bash
#
#   Run migrations manually (if needed):
#     docker compose run evennia evennia migrate --noinput

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  evennia:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EVENNIA_INSTALL_MODE: editable
        INSTALL_POSTGRES: "true"
    image: evennia/evennia:local
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "0.0.0.0:4000:4000"
      - "0.0.0.0:4001:4001"
      - "0.0.0.0:4002:4002"
    volumes:
      - .:/usr/src/game
      - ./evennia:/usr/src/evennia/evennia
    entrypoint: ["/usr/local/bin/evennia-docker-entrypoint.sh"]
    command: ["/usr/local/bin/evennia-docker-aurnom-cmd.sh"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: evennia
      POSTGRES_USER: evennia
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      # Trusted proxy hops for ip_from_request (Caddy + Next BFF). Legacy: AURNOM_TRUSTED_PROXY_HOST
      AURNOM_TRUSTED_PROXY_HOSTS: edge,frontend
      # Optional: AURNOM_SLOW_UI_LOG_MS=2500 — slow /ui/* log threshold (ms); see slow_request_logging_middleware
      # Optional: CSRF_TRUSTED_ORIGIN=http://YOUR_HOST:8080 — comma-separated origins for new servers
      AURNOM_JWT_SECRET: docker-dev-jwt-secret-change-for-production
      # HaulerEngine (optional; code defaults: max wall 2s, 96 haulers/tick, 10 pipeline steps):
      # AURNOM_HAULER_ENGINE_MAX_WALL_SEC: "2"
      # AURNOM_MAX_HAULERS_PER_ENGINE_TICK: "96"
      # AURNOM_HAULER_MAX_PIPELINE_STEPS: "10"
      EVENNIA_SUPERUSER_USERNAME: admin
      EVENNIA_SUPERUSER_PASSWORD: admin
      EVENNIA_SUPERUSER_EMAIL: ""
    # Portal on 4001 can be up before the game Server exists (Twisted then returns 501 for /ui/*).
    # Do not use `evennia status` here: it runs a Twisted AMP client and can hang or contend with the launcher.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -s /usr/src/game/game/server/server.pid && kill -0 \"$(cat /usr/src/game/game/server/server.pid)\" 2>/dev/null && python3 -c \"import socket; s=socket.create_connection(('127.0.0.1',4001),3); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 180s
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: evennia
      POSTGRES_USER: evennia
      POSTGRES_PASSWORD: password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evennia -d evennia"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Production Next: image from frontend/aurnom/Dockerfile (`next build` + standalone).
  # UI hot-reload: run `npm run dev` on the host from frontend/aurnom (or restore a dev
  # override that bind-mounts /app and uses `npm run dev`).
  frontend:
    build:
      context: ./frontend/aurnom
      dockerfile: Dockerfile
    image: aurnom-frontend:local
    container_name: evennia_frontend
    # Do not wait on service_healthy: strict checks can block `compose up` for a long time if
    # the game Server is slow; Evennia nudge script + restarts converge. Edge still needs Next up.
    depends_on:
      evennia:
        condition: service_started
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - EVENNIA_BASE_URL=http://evennia:4001
    ports:
      - "3000:3000"
    restart: unless-stopped

  edge:
    image: caddy:2-alpine
    depends_on:
      - frontend
      - evennia
    ports:
      - "8080:8080"
    environment:
      # Override when using docker-compose.dev-frontend.yml (e.g. CADDY_UPSTREAM_NEXT=frontend_dev:3000)
      CADDY_UPSTREAM_NEXT: frontend:3000
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

