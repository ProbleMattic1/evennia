# Docker Compose for Evennia with PostgreSQL
#
# Based on: https://www.evennia.com/docs/latest/Setup/Installation-Docker.html
#
# Data persistence: Both the game folder and postgres data use bind mounts to
# your host machine. Data survives `docker compose down`. Avoid `docker compose
# down -v` — the -v flag removes volumes and would delete the database.
#
# Usage:
#   Start everything:
#     docker compose up
#
#   Development (interactive shell):
#     docker compose run evennia bash
#
#   Run migrations manually (if needed):
#     docker compose run evennia evennia migrate --noinput

services:
  evennia:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EVENNIA_INSTALL_MODE: editable
        INSTALL_POSTGRES: "true"
    image: evennia/evennia:local
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:4000:4000"
      - "0.0.0.0:4001:4001"
      - "0.0.0.0:4002:4002"
    volumes:
      - .:/usr/src/game
      - ./evennia:/usr/src/evennia/evennia
    entrypoint: ["/usr/local/bin/evennia-docker-entrypoint.sh"]
    command: ["evennia", "start", "-l"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: evennia
      POSTGRES_USER: evennia
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: "5432"
      EVENNIA_SUPERUSER_USERNAME: admin
      EVENNIA_SUPERUSER_PASSWORD: admin
      EVENNIA_SUPERUSER_EMAIL: ""
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 4001), 2); s.close()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: evennia
      POSTGRES_USER: evennia
      POSTGRES_PASSWORD: password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evennia -d evennia"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Debian-based image: Tailwind v4 / lightningcss need prebuilt native binaries;
  # linux-arm64-musl (Alpine) is often missing from the optional dependency set on clean installs.
  frontend:
    image: node:20-bookworm-slim
    container_name: evennia_frontend
    working_dir: /app
    depends_on:
      evennia:
        condition: service_healthy
    environment:
      - HOSTNAME=0.0.0.0
      - EVENNIA_BASE_URL=http://evennia:4001
    volumes:
      # Bind mount alone would reuse host node_modules (e.g. macOS); Tailwind v4 /
      # lightningcss need Linux .node binaries inside this Debian image.
      # If lightningcss still fails after an image/arch change: docker compose down, then
      # docker volume rm <compose_project>_frontend_aurnom_node_modules_v2 (see docker volume ls).
      - ./frontend/aurnom:/app
      - frontend_aurnom_node_modules_v2:/app/node_modules
    command: sh -c "npm install && HOST=0.0.0.0 npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  frontend_aurnom_node_modules_v2:
